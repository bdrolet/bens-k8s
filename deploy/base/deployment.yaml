apiVersion: apps/v1
kind: Deployment
metadata:
  name: devbox
  namespace: devbox
  labels:
    app: devbox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: devbox
  template:
    metadata:
      labels:
        app: devbox
    spec:
      # Autopilot enforces a minimum of 250m CPU / 512Mi memory per pod.
      # These requests are what you actually get billed for.
      containers:
        - name: devbox
          image: devbox:latest
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: workspace
              mountPath: /workspace
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: devbox-workspace
